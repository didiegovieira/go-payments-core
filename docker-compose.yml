services:
  payments:
    build:
      context: .
      dockerfile: ./apps/payments/Dockerfile
    environment:
      APP_ENV: development
      HTTP_PORT: 8080
    ports:
      - "8080:8080"
  audit:
    build: ./apps/audit
    ports:
      - "8081:8081"
  fraud:
    build: ./apps/fraud
    ports:
      - "8082:8082"
  notifications:
    build: ./apps/notifications
    ports:
      - "8083:8083"
